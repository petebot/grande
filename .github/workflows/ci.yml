name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PUBLIC_SANITY_PROJECT_ID: ${{ vars.PUBLIC_SANITY_PROJECT_ID || 'w6vleqf7' }}
  PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET || 'development' }}
  PUBLIC_SANITY_API_VERSION: ${{ vars.PUBLIC_SANITY_API_VERSION || '2026-07-21' }}
  PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'http://127.0.0.1:4173' }}
  SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID || 'w6vleqf7' }}
  SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET || 'development' }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run formatting, lint, and type checks
        run: pnpm check

      - name: Run unit tests
        run: pnpm test:unit

      - name: Validate published content snapshot
        run: pnpm content:snapshot:validate

      - name: Build workspace
        run: pnpm build

  browser-tests:
    name: Browser tests
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run browser tests
        run: pnpm test:e2e

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-failures-${{ github.run_attempt }}
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

name: Design-system contract

on:
  schedule:
    - cron: '17 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-check:
    name: Check canonical version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compare adopted and canonical contracts
        env:
          DESIGN_SYSTEM_CONTRACT_TOKEN: ${{ secrets.DESIGN_SYSTEM_CONTRACT_TOKEN }}
        run: pnpm design-system:version
